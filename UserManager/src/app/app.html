<div class="page">

  <header class="hero">
    <div>
      <h1>Gestion des utilisateurs</h1>
      <p>Interface simple, responsive et connectée à l’API .NET</p>
    </div>
  </header>

  <!-- FORMULAIRE -->
  <app-user-form
    [user]="selectedUser"
    [isEditing]="isEditing"
    (save)="onSave($event)"
    (cancel)="cancelEdit()">
  </app-user-form>


  <!-- LISTE + RECHERCHE -->
  <section class="panel">

    <div class="toolbar">
      <div class="search-box">
        <input
          type="text"
          [(ngModel)]="searchTerm"
          name="searchTerm"
          placeholder="Rechercher par prénom ou nom"
          (input)="onSearch()" />
      </div>

      <button class="btn secondary" (click)="clearSearch()">
        Réinitialiser
      </button>
    </div>


    <div class="results-header">
      <h2>Liste des utilisateurs</h2>
      <span>{{ totalCount }} résultat(s)</span>
    </div>


    <!-- LISTE -->
    <app-user-list
      [users]="users"
      (edit)="editUser($event)"
      (delete)="deleteUser($event)">
    </app-user-list>


    <!-- PAGINATION -->
    <div class="pagination">
      <button
        class="btn secondary"
        (click)="previousPage()"
        [disabled]="currentPage === 1">
        Précédent
      </button>

      <span>Page {{ currentPage }} / {{ totalPages }}</span>

      <button
        class="btn secondary"
        (click)="nextPage()"
        [disabled]="currentPage === totalPages">
        Suivant
      </button>
    </div>

  </section>

</div>
