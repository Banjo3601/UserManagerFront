<section class="panel">
  <div class="panel-header">
    <h2>{{ isEditing ? 'Modifier un utilisateur' : 'Créer un utilisateur' }}</h2>
  </div>

  <form class="user-form" (ngSubmit)="submitForm()">
    <div class="form-grid">
      <div class="field">
        <label>Prénom</label>
        <input [(ngModel)]="formUser.firstName" name="firstName" required />
      </div>

      <div class="field">
        <label>Nom</label>
        <input [(ngModel)]="formUser.lastName" name="lastName" required />
      </div>

      <div class="field">
        <label>Email</label>
        <input [(ngModel)]="formUser.email" name="email" type="email" required />
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <input [(ngModel)]="formUser.password" name="password" type="text" required />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn primary">
        {{ isEditing ? 'Enregistrer' : 'Créer' }}
      </button>

      <button *ngIf="isEditing" type="button" class="btn secondary" (click)="onCancel()">
        Annuler
      </button>
    </div>
  </form>
</section>
